server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
#      discovery:
#        locator:
#          enabled: true   # 🔥 important (dynamic routing from Eureka)

      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: flight-service
          uri: lb://flight-service
          predicates:
            - Path=/api/flights/**

        - id: seat-service
          uri: lb://seat-service
          predicates:
            - Path=/api/seats/**

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# 🔍 Optional (helps debugging if needed)
logging:
  level:
    org.springframework.cloud.gateway: DEBUG